    <rect width="1024" height="1024" rx="232" fill="url(#g)"/>
    <g fill="#fff"><rect x="300" y="452" width="74" height="120" rx="20"/><polygon points="362,452 362,572 486,654 486,370"/></g>
    <g fill="none" stroke="#fff" stroke-linecap="round"><path d="M455.6 356.4 A220 220 0 0 1 455.6 667.6" stroke-width="46"/><path d="M519.2 292.8 A310 310 0 0 1 519.2 731.2" stroke-width="42" opacity=".85"/><path d="M582.8 229.2 A400 400 0 0 1 582.8 794.8" stroke-width="38" opacity=".6"/></g>
