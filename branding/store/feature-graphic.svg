<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg"
     font-family="'Trebuchet MS','DejaVu Sans',sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A855F7"/><stop offset="0.55" stop-color="#D946C6"/><stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#EC4899" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="500" fill="#0A0A0F"/>
