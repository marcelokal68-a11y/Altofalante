  <text x="370" y="225" font-size="78" font-weight="800" fill="#F5F3FF">alto<tspan fill="#EC4899">falante</tspan></text>
  <text x="372" y="285" font-size="30" font-weight="700" fill="#22D3EE">Seu celular, sua caixa de som.</text>
  <text x="372" y="330" font-size="22" fill="#9CA3AF">Mais alto e mais limpo — e vários celulares tocam juntos.</text>
