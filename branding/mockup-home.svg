<svg width="460" height="940" viewBox="0 0 460 940" xmlns="http://www.w3.org/2000/svg"
     font-family="'DejaVu Sans',sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A855F7"/><stop offset="0.55" stop-color="#D946C6"/><stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#EC4899" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- device -->
  <rect x="8" y="8" width="444" height="924" rx="52" fill="#000"/>
  <rect x="20" y="22" width="420" height="896" rx="42" fill="#0A0A0F"/>
  <rect x="196" y="34" width="68" height="8" rx="4" fill="#1c1c28"/>

  <!-- header -->
  <g transform="translate(34,62) scale(0.032)">
    <rect width="1024" height="1024" rx="232" fill="url(#grad)"/>
    <g fill="#fff"><rect x="300" y="452" width="74" height="120" rx="20"/><polygon points="362,452 362,572 486,654 486,370"/></g>
    <g fill="none" stroke="#fff" stroke-linecap="round"><path d="M455.6 356.4 A220 220 0 0 1 455.6 667.6" stroke-width="44"/><path d="M519.2 292.8 A310 310 0 0 1 519.2 731.2" stroke-width="40" opacity="0.85"/></g>
  </g>
  <text x="72" y="80" font-size="19" font-weight="bold" fill="#F5F3FF">alto<tspan fill="#EC4899">falante</tspan></text>
  <circle cx="416" cy="64" r="2.6" fill="#6b6b7a"/><circle cx="416" cy="73" r="2.6" fill="#6b6b7a"/><circle cx="416" cy="82" r="2.6" fill="#6b6b7a"/>

  <!-- now playing -->
  <rect x="34" y="108" width="54" height="54" rx="14" fill="url(#grad)"/>
  <g fill="#fff" opacity="0.92"><circle cx="55" cy="146" r="6"/><circle cx="73" cy="141" r="6"/><rect x="60" y="120" width="3.4" height="24" /><rect x="76.6" y="116" width="3.4" height="24"/><rect x="60" y="120" width="20" height="4"/></g>
  <text x="100" y="130" font-size="16" font-weight="bold" fill="#F5F5FA">Let It Happen</text>
  <text x="100" y="151" font-size="12.5" fill="#8b8b99">Tame Impala &#183; tocando agora</text>

  <!-- halo + turbo -->
  <circle cx="230" cy="380" r="178" fill="url(#halo)"/>
  <circle cx="230" cy="380" r="148" fill="none" stroke="#EC4899" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="230" cy="380" r="130" fill="none" stroke="#EC4899" stroke-opacity="0.26" stroke-width="2"/>
  <circle cx="230" cy="380" r="114" fill="url(#grad)"/>

  <!-- equalizer bars -->
  <g fill="#fff">
    <rect x="167" y="338" width="15" height="52" rx="7.5"/>
    <rect x="194" y="322" width="15" height="84" rx="7.5"/>
    <rect x="221" y="310" width="15" height="108" rx="7.5"/>
    <rect x="248" y="328" width="15" height="72" rx="7.5"/>
    <rect x="275" y="344" width="15" height="44" rx="7.5"/>
  </g>
  <text x="230" y="450" font-size="21" font-weight="bold" fill="#fff" text-anchor="middle">TURBO ON</text>

  <!-- loud badge -->
  <rect x="92" y="512" width="276" height="34" rx="17" fill="#0e2a30" stroke="#22D3EE" stroke-opacity="0.45"/>
  <text x="230" y="534" font-size="13" font-weight="bold" fill="#22D3EE" text-anchor="middle">+6 dB de volume, sem distorcer</text>

  <!-- presets -->
  <g font-size="13.5" font-weight="bold" text-anchor="middle">
    <rect x="64" y="574" width="66" height="40" rx="20" fill="#17171f" stroke="#33333f"/>
    <text x="97" y="599" fill="#c8c8d2">Voz</text>
    <rect x="140" y="574" width="132" height="40" rx="20" fill="url(#grad)"/>
    <text x="206" y="599" fill="#fff">Equilibrado</text>
    <rect x="282" y="574" width="96" height="40" rx="20" fill="#17171f" stroke="#33333f"/>
    <text x="330" y="599" fill="#c8c8d2">Grave+</text>

    <rect x="118" y="624" width="84" height="40" rx="20" fill="#17171f" stroke="#33333f"/>
    <text x="160" y="649" fill="#c8c8d2">Festa</text>
    <rect x="212" y="624" width="130" height="40" rx="20" fill="#17171f" stroke="#33333f"/>
    <text x="277" y="649" fill="#c8c8d2">Caixa portátil</text>
  </g>

  <!-- multi-device link -->
  <text x="230" y="714" font-size="13.5" font-weight="bold" fill="#22D3EE" text-anchor="middle">+ tocar junto com outro celular</text>

  <!-- player controls -->
  <g fill="#8b8b99">
    <rect x="135" y="786" width="5" height="28" rx="2.5"/>
    <polygon points="168,786 168,814 146,800"/>
    <polygon points="292,786 292,814 314,800"/>
    <rect x="316" y="786" width="5" height="28" rx="2.5"/>
  </g>
  <circle cx="230" cy="800" r="44" fill="#fff"/>
  <polygon points="219,780 219,820 251,800" fill="#0A0A0F"/>

  <!-- home indicator -->
  <rect x="180" y="884" width="100" height="6" rx="3" fill="#2a2a38"/>
</svg>
